services:
  backend:
    build: ./backend
    container_name: stem-backend
    ports:
      - "8000:8000"
    env_file: .env
    # Bind-mount source for hot reload; SQLite DB and uploads/ persist here too.
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: stem-frontend
    # Host 3000 is often busy in dev — publish on 3001 instead.
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      # Browser hits the host, so localhost:8000 is the backend port we publish above.
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  # Bot is opt-in: `docker compose --profile bot up` (needs BOT_TOKEN in .env).
  bot:
    build: ./bot
    container_name: stem-bot
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    profiles: ["bot"]

volumes:
  frontend_node_modules:
